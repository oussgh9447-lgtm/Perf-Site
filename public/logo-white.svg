<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" fill="white">
  <!-- Logo icon - simplified atom/person figure in white -->
  <g transform="translate(0, 4)">
    <circle cx="12" cy="16" r="10" fill="none" stroke="white" stroke-width="1.5"/>
    <ellipse cx="12" cy="16" rx="4" ry="10" fill="none" stroke="white" stroke-width="1" transform="rotate(30 12 16)"/>
    <ellipse cx="12" cy="16" rx="4" ry="10" fill="none" stroke="white" stroke-width="1" transform="rotate(-30 12 16)"/>
    <circle cx="12" cy="16" r="2" fill="white"/>
  </g>
  
  <!-- Vertical line separator -->
  <line x1="30" y1="4" x2="30" y2="36" stroke="white" stroke-width="1"/>
  
  <!-- Text: Perf-analysis -->
  <text x="40" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Perf-analysis</text>
  
  <!-- Text: Consulting -->
  <text x="40" y="35" font-family="Arial, sans-serif" font-size="14" fill="white">Consulting</text>
</svg>
